name: Publish CLI to PyPI

on:
  release:
    types: [published]
  # Allow manual invocation for dry-runs from the Actions tab.
  workflow_dispatch:
    inputs:
      publish:
        description: "Actually publish (false = build only)"
        type: boolean
        default: false

# This workflow uses PyPI Trusted Publishing — no API token needed.
# One-time setup at https://pypi.org/manage/account/publishing/:
#   PyPI project name: virgil
#   Owner:             ayaanmaliksgithub
#   Repository:        virgil
#   Workflow:          publish-cli.yml
#   Environment:       pypi
#
# After that, any release tag like `v0.1.0` triggers a publish.

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade build

      - name: Sanity-check version matches tag
        if: github.event_name == 'release'
        working-directory: apps/cli
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version=$(python -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          if [ "$tag" != "$version" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match pyproject version $version"
            exit 1
          fi
          echo "Tag $GITHUB_REF_NAME matches CLI version $version"

      - name: Build sdist + wheel
        working-directory: apps/cli
        run: python -m build

      - name: Upload built artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: apps/cli/dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Only publish on a real release, or a workflow_dispatch with publish=true.
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.publish)
    environment:
      name: pypi
      url: https://pypi.org/p/virgil
    permissions:
      id-token: write  # required for PyPI OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
