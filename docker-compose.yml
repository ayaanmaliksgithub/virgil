# Local development stack.
# The worker mounts the host Docker socket so it can launch per-scan sandbox
# containers. Treat this socket as a privileged interface — production should
# use a dedicated sandbox host or a rootless runtime.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: audit
      POSTGRES_PASSWORD: audit
      POSTGRES_DB: audit
    ports: ["5432:5432"]
    volumes: ["pg-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audit"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniominio
    ports: ["9000:9000", "9001:9001"]
    volumes: ["minio-data:/data"]

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    env_file: [.env]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    ports: ["8000:8000"]
    volumes:
      - audit-uploads:/var/audit/uploads

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    env_file: [.env]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - audit-work:/var/audit/work
      - audit-uploads:/var/audit/uploads
    environment:
      WORK_ROOT: /var/audit/work

  scanner-image-builder:
    # Builds the scanner image so the worker can launch it. Runs once and exits.
    image: docker:26-cli
    depends_on: [worker]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker/scanner.Dockerfile:/scanner.Dockerfile:ro
      - ./:/ctx:ro
    command: ["docker", "build", "-t", "virgil/scanner:latest", "-f", "/scanner.Dockerfile", "/ctx"]

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE: "http://localhost:8000"
    ports: ["3000:3000"]
    depends_on: [api]

volumes:
  pg-data:
  minio-data:
  audit-work:
  audit-uploads:
